<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бджоляр CRM - Интерактивная Родословная</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --sidebar-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent-blue: #3b82f6;
            --accent-yellow: #eab308;
            --border-color: #e2e8f0;
        }

        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 380px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 15px rgba(0,0,0,0.03);
            z-index: 100;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-header h1 {
            font-size: 20px;
            margin: 0 0 16px 0;
            color: var(--accent-blue);
        }

        .controls-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #searchInput, #sortSelect {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            background-color: white;
        }

        #searchInput:focus { border-color: var(--accent-blue); }

        .results-list {
            flex: 1;
            overflow-y: auto;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .queen-item {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s;
        }

        .queen-item:hover { background-color: #f1f5f9; }
        .queen-item.active { background-color: #eff6ff; border-left: 4px solid var(--accent-blue); }
        .queen-line { font-weight: 700; font-size: 15px; }
        .queen-meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

        .viewport {
            flex: 1;
            position: relative;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 30px 30px;
        }

        #tree-canvas { width: 100%; height: 100%; cursor: grab; }
        #tree-canvas:active { cursor: grabbing; }

        .node rect { fill: white; stroke: #e2e8f0; stroke-width: 1px; rx: 6; ry: 6; }
        .node-title { font-weight: bold; font-size: 13px; fill: #1e293b; }
        .node-info { font-size: 11px; fill: #ef4444; }
        .node-breed { font-size: 10px; fill: #64748b; }
        .link { fill: none; stroke: #94a3b8; stroke-width: 1.5px; }
        .breed-strip { height: 4px; }
        .strip-buckfast { fill: var(--accent-yellow); }
        .strip-italian { fill: var(--accent-blue); }

        .tooltip {
            position: absolute;
            padding: 8px 12px;
            background: rgba(15, 23, 42, 0.9);
            color: white;
            border-radius: 6px;
            font-size: 12px;
            pointer-events: none;
            z-index: 1000;
            display: none;
        }
    </style>
</head>
<body>

    <div id="tooltip" class="tooltip"></div>

    <div class="sidebar">
        <div class="sidebar-header">
            <h1>Бджоляр CRM</h1>
            <div class="controls-row">
                <input type="text" id="searchInput" placeholder="Поиск по линии или метке..." oninput="filterQueens()">
                <select id="sortSelect" onchange="filterQueens()">
                    <option value="none">Без сортировки</option>
                    <option value="yearDesc">Год: по убыванию (новые выше)</option>
                    <option value="yearAsc">Год: по возрастанию (старые выше)</option>
                </select>
            </div>
        </div>
        <ul class="results-list" id="resultsList"></ul>
    </div>

    <div class="viewport">
        <svg id="tree-canvas"></svg>
    </div>

    <script src="database.js"></script>

    <script>
        const svg = d3.select("#tree-canvas");
        const g = svg.append("g");
        const tooltip = d3.select("#tooltip");

        const zoom = d3.zoom()
            .scaleExtent([0.1, 3])
            .on("zoom", (event) => g.attr("transform", event.transform));
        
        svg.call(zoom);

        function filterQueens() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const sortMode = document.getElementById('sortSelect').value;
            const list = document.getElementById('resultsList');
            list.innerHTML = '';

            // 1. Фильтрация
            let filtered = queensDatabase.filter(d => {
                const q = d.queen || {};
                return `${q.line} ${q.markNumber} ${q.breederAbbr}`.toLowerCase().includes(query);
            });

            // 2. Сортировка
            if (sortMode === 'yearAsc') {
                filtered.sort((a, b) => new Date(a.queen.birthday) - new Date(b.queen.birthday));
            } else if (sortMode === 'yearDesc') {
                filtered.sort((a, b) => new Date(b.queen.birthday) - new Date(a.queen.birthday));
            }

            // 3. Отрисовка списка
            filtered.forEach(data => {
                const q = data.queen || {};
                const li = document.createElement('li');
                li.className = 'queen-item';
                li.innerHTML = `
                    <div class="queen-line">${q.line} (${q.breederAbbr})</div>
                    <div class="queen-meta">${q.breedName} • Метка: ${q.markNumber || '—'} • ${new Date(q.birthday).getFullYear()}</div>
                `;
                li.onclick = () => {
                    document.querySelectorAll('.queen-item').forEach(el => el.classList.remove('active'));
                    li.classList.add('active');
                    drawTree(data.pedigreeTree);
                };
                list.appendChild(li);
            });
        }

        function drawTree(rootData) {
            g.selectAll("*").remove();

            const hierarchy = d3.hierarchy(rootData, d => {
                const children = [];
                if (d.mother) children.push(d.mother);
                if (d.dronesMother) children.push(d.dronesMother);
                return children;
            });

            const nodeWidth = 180;
            const nodeHeight = 60;
            const treeLayout = d3.tree().nodeSize([nodeHeight + 40, nodeWidth + 100]);
            
            treeLayout(hierarchy);

            g.selectAll(".link")
                .data(hierarchy.links())
                .enter()
                .append("path")
                .attr("class", "link")
                .attr("d", d3.linkHorizontal().x(d => d.y).y(d => d.x));

            const node = g.selectAll(".node")
                .data(hierarchy.descendants())
                .enter()
                .append("g")
                .attr("class", "node")
                .attr("transform", d => `translate(${d.y},${d.x - nodeHeight/2})`)
                .on("mouseover", (event, d) => {
                    tooltip.style("display", "block")
                           .html(`<b>${d.data.line}</b><br>${d.data.inseminationText || 'Нет данных'}`);
                })
                .on("mousemove", (event) => {
                    tooltip.style("left", (event.pageX + 10) + "px")
                           .style("top", (event.pageY - 10) + "px");
                })
                .on("mouseout", () => tooltip.style("display", "none"));

            node.append("rect").attr("width", nodeWidth).attr("height", nodeHeight);

            node.append("rect")
                .attr("width", nodeWidth)
                .attr("height", 4)
                .attr("class", d => {
                    const b = (d.data.breed || "").toLowerCase();
                    if (b.includes("buckfast")) return "strip-buckfast";
                    if (b.includes("italian")) return "strip-italian";
                    return "";
                });

            node.append("text").attr("class", "node-title").attr("x", 10).attr("y", 25)
                .text(d => `${d.data.line || 'Неизв.'}.${d.data.year || ''} (${d.data.breederAbbr || d.data.breader || ''})`);

            node.append("text").attr("class", "node-info").attr("x", 10).attr("y", 42)
                .text(d => (d.data.inseminationText || "").substring(0, 25));

            node.append("text").attr("class", "node-breed").attr("x", 10).attr("y", 54)
                .text(d => d.data.breed || "");

            svg.call(zoom.transform, d3.zoomIdentity.translate(100, 300).scale(0.8));
        }

        window.onload = filterQueens;
    </script>
</body>
</html>
