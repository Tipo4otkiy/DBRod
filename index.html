<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ownerka CRM - Родословные</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --bg-color: #f4f4f4;
            --sidebar-bg: #ffffff;
            --text-main: #111;
            --text-muted: #666;
            --accent-blue: #3b82f6;
            --border-color: #ddd;
        }

        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif; 
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Интерфейс --- */
        .sidebar {
            width: 350px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            z-index: 100;
        }

        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border-color); }
        .sidebar-header h1 { font-size: 20px; margin: 0 0 15px 0; color: #000; letter-spacing: -0.5px; }
        .controls-row { display: flex; flex-direction: column; gap: 10px; }
        #searchInput, #sortSelect { width: 100%; padding: 10px 14px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; outline: none; }

        .print-btn {
            background-color: #10b981; color: white; border: none; padding: 12px;
            border-radius: 4px; font-size: 14px; font-weight: bold; cursor: pointer;
            transition: background 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .print-btn:hover { background-color: #059669; }

        .results-list { flex: 1; overflow-y: auto; margin: 0; padding: 0; list-style: none; }
        .queen-item { padding: 15px 20px; border-bottom: 1px solid #eee; cursor: pointer; }
        .queen-item:hover { background-color: #f9f9f9; }
        .queen-item.active { background-color: #e6f0ff; border-left: 4px solid var(--accent-blue); }
        .queen-line { font-weight: 600; font-size: 14px; }
        .queen-meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

        .viewport { flex: 1; position: relative; background-color: #ffffff; }
        #tree-canvas { width: 100%; height: 100%; cursor: grab; }

        .node-text { font-size: 15px; font-weight: 600; fill: #111; }
        .insemination-text { font-size: 13px; fill: #d93025; }
        .link { fill: none; stroke: #888; stroke-width: 1.5px; }

        /* --- Всплывающее окно --- */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.7); z-index: 9999;
            align-items: center; justify-content: center; backdrop-filter: blur(2px);
        }
        .modal-content { background: white; padding: 30px; border-radius: 12px; max-width: 450px; text-align: center; }
        .modal-content .highlight { background: #f1f5f9; padding: 10px; border-radius: 6px; border-left: 4px solid #10b981; margin: 20px 0; text-align: left; }
        .modal-btn { background: var(--accent-blue); color: white; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; }

        /* --- ПЕЧАТЬ --- */
        #print-area { display: none; }
        @media print {
            body { height: auto; overflow: visible; display: block; background: white; }
            .sidebar, .viewport, .modal-overlay { display: none !important; }
            #print-area { display: block !important; }
            @page { size: A4 portrait; margin: 8mm; } /* Уменьшил поля */
            .print-page { page-break-after: always; width: 100%; height: 280mm; position: relative; }
            .print-header { border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 10px; font-size: 16px; font-weight: bold; }
            .node-text { font-size: 13px !important; font-weight: 700 !important; }
            .insemination-text { font-size: 11px !important; fill: #000 !important; }
        }
    </style>
</head>
<body>

    <div class="modal-overlay" id="pdfModal">
        <div class="modal-content">
            <h3>Сохранение PDF</h3>
            
            <div style="display: flex; gap: 10px; margin-bottom: 15px; justify-content: center; align-items: center;">
                <label style="font-size: 14px; font-weight: bold;">Год:</label>
                <input type="number" id="pdfYearFrom" placeholder="С (напр. 2021)" style="padding: 8px; width: 125px; border: 1px solid #ccc; border-radius: 4px; outline: none;">
                <span>-</span>
                <input type="number" id="pdfYearTo" placeholder="По (напр. 2024)" style="padding: 8px; width: 125px; border: 1px solid #ccc; border-radius: 4px; outline: none;">
            </div>

            <div class="highlight">
                <p>1. В окне печати выберите <b>«Сохранить как PDF»</b>.<br>
                   2. Убедитесь, что ориентация <b>Книжная</b>.<br>
                   3. Нажмите <b>Сохранить</b>.</p>
            </div>
            <button class="modal-btn" onclick="startPdfGeneration()">Создать PDF</button>
            <button onclick="closeModal()" style="background:none; border:none; color:#64748b; margin-top:15px; cursor:pointer; text-decoration:underline;">Отмена</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">
            <h1>Ownerka CRM</h1>
            <div class="controls-row">
                <input type="text" id="searchInput" placeholder="Поиск линии..." oninput="filterQueens()">
                <select id="sortSelect" onchange="filterQueens()">
                    <option value="none">Без сортировки</option>
                    <option value="yearDesc">Новые сверху (Год ↓)</option>
                    <option value="yearAsc">Старые сверху (Год ↑)</option>
                </select>
                <button class="print-btn" onclick="openModal()">📄 Скачать PDF</button>
            </div>
        </div>
        <ul class="results-list" id="resultsList"></ul>
    </div>

    <div class="viewport"><svg id="tree-canvas"></svg></div>
    <div id="print-area"></div>

    <script src="database.js"></script>

    <script>
        const svg = d3.select("#tree-canvas");
        const g = svg.append("g");
        const zoom = d3.zoom().scaleExtent([0.1, 4]).on("zoom", (e) => g.attr("transform", e.transform));
        svg.call(zoom);

        function openModal() { document.getElementById('pdfModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('pdfModal').style.display = 'none'; }

        function filterQueens() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const sortMode = document.getElementById('sortSelect').value;
            const list = document.getElementById('resultsList');
            list.innerHTML = '';

            let filtered = queensDatabase.filter(d => {
                const q = d.queen || {};
                return `${q.line} ${q.markNumber} ${q.breederAbbr}`.toLowerCase().includes(query);
            });

            if (sortMode === 'yearAsc') filtered.sort((a, b) => new Date(a.queen.birthday) - new Date(b.queen.birthday));
            else if (sortMode === 'yearDesc') filtered.sort((a, b) => new Date(b.queen.birthday) - new Date(a.queen.birthday));

            filtered.forEach(data => {
                const q = data.queen || {};
                const li = document.createElement('li');
                li.className = 'queen-item';
                li.innerHTML = `<div class="queen-line">${q.line} (${q.breederAbbr})</div>
                                <div class="queen-meta">${q.breedName} • ${new Date(q.birthday).getFullYear()}</div>`;
                li.onclick = () => {
                    document.querySelectorAll('.queen-item').forEach(el => el.classList.remove('active'));
                    li.classList.add('active');
                    drawTree(data.pedigreeTree, g, [50, 220]);
                    svg.call(zoom.transform, d3.zoomIdentity.translate(40, 300).scale(0.8));
                };
                list.appendChild(li);
            });
        }

        function drawTree(rootData, svgGroup, nodeSizes) {
            svgGroup.selectAll("*").remove();
            const hierarchy = d3.hierarchy(rootData, d => {
                const c = [];
                if (d.mother) c.push(d.mother);
                if (d.dronesMother) c.push(d.dronesMother);
                return c;
            });
            const treeLayout = d3.tree().nodeSize(nodeSizes);
            treeLayout(hierarchy);

            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            hierarchy.descendants().forEach(d => {
                minX = Math.min(minX, d.x); maxX = Math.max(maxX, d.x);
                minY = Math.min(minY, d.y); maxY = Math.max(maxY, d.y);
            });

            svgGroup.selectAll(".link").data(hierarchy.links()).enter().append("path").attr("class", "link")
                .attr("d", d => {
                    const turnX = d.source.y + (nodeSizes[1] * 0.88); 
                    return `M ${d.source.y},${d.source.x} H ${turnX} V ${d.target.x} H ${d.target.y}`;
                });

            const node = svgGroup.selectAll(".node").data(hierarchy.descendants()).enter().append("g")
                .attr("class", "node").attr("transform", d => `translate(${d.y},${d.x})`);

            node.append("text").attr("class", "node-text").attr("dy", "-0.25em").attr("x", 5)
                .text(d => {
                    if (!d.data.line || d.data.line === "Невідомо") return "Невідомо";
                    return `${d.data.line}${d.data.year ? '.'+d.data.year : ''} (${d.data.breederAbbr || d.data.breader || ''})`;
                });

            node.append("text").attr("class", "insemination-text").attr("dy", "1.1em").attr("x", 5)
                .text(d => (d.data.mother || d.data.dronesMother) ? d.data.inseminationText : "");

            return { minX, maxX, minY, maxY };
        }

        function startPdfGeneration() {
            // Считываем значения из новых инпутов годов
            const yearFromInput = document.getElementById('pdfYearFrom').value;
            const yearToInput = document.getElementById('pdfYearTo').value;
            // Если поле пустое, берем крайние значения
            const yearFrom = yearFromInput ? parseInt(yearFromInput) : 0;
            const yearTo = yearToInput ? parseInt(yearToInput) : 9999;

            closeModal();
            const query = document.getElementById('searchInput').value.toLowerCase();
            const sortMode = document.getElementById('sortSelect').value;
            
            // Фильтруем базу по поиску и по выбранному диапазону годов
            let printDB = queensDatabase.filter(d => {
                const q = d.queen || {};
                let year = 0;
                if (q.birthday) {
                    year = new Date(q.birthday).getFullYear();
                }
                
                const matchSearch = `${q.line} ${q.breederAbbr}`.toLowerCase().includes(query);
                const matchYear = year >= yearFrom && year <= yearTo;
                
                return matchSearch && matchYear;
            });
            
            if (printDB.length === 0) {
                alert("Нет данных для сохранения в PDF в выбранном диапазоне годов.");
                return;
            }

            if (sortMode === 'yearAsc') printDB.sort((a, b) => new Date(a.queen.birthday) - new Date(b.queen.birthday));
            else if (sortMode === 'yearDesc') printDB.sort((a, b) => new Date(b.queen.birthday) - new Date(a.queen.birthday));

            const printArea = document.getElementById('print-area');
            printArea.innerHTML = '';

            printDB.forEach((data) => {
                const pageDiv = document.createElement('div');
                pageDiv.className = 'print-page';
                const year = new Date(data.queen.birthday).getFullYear();
                pageDiv.innerHTML = `<div class="print-header">Линия: ${data.queen.line} (${data.queen.breederAbbr}) | ${year}</div>`;
                
                const svgElem = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                svgElem.style.width = '100%'; svgElem.style.height = '94%';
                const gElem = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                svgElem.appendChild(gElem);
                pageDiv.appendChild(svgElem);
                printArea.appendChild(pageDiv);

                // Плотная отрисовка для PDF
                const bounds = drawTree(data.pedigreeTree, d3.select(gElem), [32, 140]);

                const treeHeight = (bounds.maxX - bounds.minX) + 100;
                const treeWidth = (bounds.maxY - bounds.minY) + 250; // +250 запас под текст справа
                
                // Динамический viewBox: сжимаем, если дерево шире или выше стандарта
                const viewW = Math.max(850, treeWidth);
                const viewH = Math.max(1150, treeHeight);
                svgElem.setAttribute('viewBox', `0 0 ${viewW} ${viewH}`);

                const offsetY = Math.abs(bounds.minX) + 50;
                gElem.setAttribute('transform', `translate(5, ${offsetY})`); // Сдвиг вплотную влево (5px)
            });

            setTimeout(() => { window.print(); printArea.innerHTML = ''; }, 1000);
        }
        window.onload = filterQueens;
    </script>
</body>
</html>
