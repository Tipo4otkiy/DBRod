<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ownerka CRM - Родословные</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --bg-color: #f4f4f4;
            --sidebar-bg: #ffffff;
            --text-main: #111;
            --text-muted: #666;
            --accent-blue: #3b82f6;
            --border-color: #ddd;
        }

        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif; 
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Стили интерфейса --- */
        .sidebar {
            width: 350px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            z-index: 100;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-header h1 {
            font-size: 20px;
            margin: 0 0 15px 0;
            color: #000;
            letter-spacing: -0.5px;
        }

        .controls-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #searchInput, #sortSelect {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
        }

        .print-btn {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .print-btn:hover { background-color: #059669; }

        .results-list {
            flex: 1;
            overflow-y: auto;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .queen-item {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }

        .queen-item:hover { background-color: #f9f9f9; }
        .queen-item.active { background-color: #e6f0ff; border-left: 4px solid var(--accent-blue); }
        .queen-line { font-weight: 600; font-size: 14px; }
        .queen-meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

        .viewport {
            flex: 1;
            position: relative;
            background-color: #ffffff;
        }

        #tree-canvas { width: 100%; height: 100%; cursor: grab; }

        /* Стили дерева (Экран) */
        .node-text { font-size: 15px; font-weight: 600; fill: #111; font-family: 'Segoe UI', sans-serif; }
        .insemination-text { font-size: 13px; fill: #d93025; font-family: 'Segoe UI', sans-serif; }
        .link { fill: none; stroke: #888; stroke-width: 1.5px; }

        /* --- Стили для печати (Книжная) --- */
        #print-area { display: none; }

        @media print {
            body { height: auto; overflow: visible; display: block; background: white; }
            .sidebar, .viewport { display: none !important; }
            #print-area { display: block !important; }
            
            /* Книжная ориентация с минимальными полями */
            @page { size: A4 portrait; margin: 10mm; }

            .print-page {
                page-break-after: always;
                page-break-inside: avoid;
                width: 100%;
                height: 275mm;
                position: relative;
            }

            .print-header {
                border-bottom: 2px solid #000;
                padding-bottom: 8px;
                margin-bottom: 10px;
                font-size: 18px;
                font-weight: bold;
                font-family: 'Segoe UI', sans-serif;
            }

            /* Крупные шрифты для PDF */
            .node-text { font-size: 14px !important; font-weight: 700 !important; }
            .insemination-text { font-size: 12px !important; fill: #000 !important; } 
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h1>Ownerka CRM</h1>
            <div class="controls-row">
                <input type="text" id="searchInput" placeholder="Поиск линии..." oninput="filterQueens()">
                <select id="sortSelect" onchange="filterQueens()">
                    <option value="none">Без сортировки</option>
                    <option value="yearDesc">Новые сверху (Год ↓)</option>
                    <option value="yearAsc">Старые сверху (Год ↑)</option>
                </select>
                <button class="print-btn" onclick="generatePdfAll()">🖨️ Распечатать список</button>
            </div>
        </div>
        <ul class="results-list" id="resultsList"></ul>
    </div>

    <div class="viewport">
        <svg id="tree-canvas"></svg>
    </div>

    <div id="print-area"></div>

    <script src="database.js"></script>

    <script>
        const svg = d3.select("#tree-canvas");
        const g = svg.append("g");

        const zoom = d3.zoom()
            .scaleExtent([0.1, 4])
            .on("zoom", (event) => g.attr("transform", event.transform));
        
        svg.call(zoom);

        function filterQueens() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const sortMode = document.getElementById('sortSelect').value;
            const list = document.getElementById('resultsList');
            list.innerHTML = '';

            let filtered = queensDatabase.filter(d => {
                const q = d.queen || {};
                return `${q.line} ${q.markNumber} ${q.breederAbbr}`.toLowerCase().includes(query);
            });

            if (sortMode === 'yearAsc') {
                filtered.sort((a, b) => new Date(a.queen.birthday) - new Date(b.queen.birthday));
            } else if (sortMode === 'yearDesc') {
                filtered.sort((a, b) => new Date(b.queen.birthday) - new Date(a.queen.birthday));
            }

            filtered.forEach(data => {
                const q = data.queen || {};
                const li = document.createElement('li');
                li.className = 'queen-item';
                li.innerHTML = `
                    <div class="queen-line">${q.line} (${q.breederAbbr})</div>
                    <div class="queen-meta">${q.breedName} • Метка: ${q.markNumber || '—'} • ${new Date(q.birthday).getFullYear()}</div>
                `;
                li.onclick = () => {
                    document.querySelectorAll('.queen-item').forEach(el => el.classList.remove('active'));
                    li.classList.add('active');
                    
                    drawTree(data.pedigreeTree, g, [50, 240]);
                    
                    const parent = svg.node().getBoundingClientRect();
                    svg.call(zoom.transform, d3.zoomIdentity.translate(80, parent.height / 2).scale(0.85));
                };
                list.appendChild(li);
            });
        }

        function drawTree(rootData, svgGroup, nodeSizes) {
            svgGroup.selectAll("*").remove();

            const hierarchy = d3.hierarchy(rootData, d => {
                const children = [];
                if (d.mother) children.push(d.mother);
                if (d.dronesMother) children.push(d.dronesMother);
                return children;
            });

            const treeLayout = d3.tree().nodeSize(nodeSizes);
            treeLayout(hierarchy);

            let minX = Infinity, maxX = -Infinity;
            let minY = Infinity, maxY = -Infinity;

            hierarchy.descendants().forEach(d => {
                if (d.x < minX) minX = d.x;
                if (d.x > maxX) maxX = d.x;
                if (d.y < minY) minY = d.y;
                if (d.y > maxY) maxY = d.y;
            });

            svgGroup.selectAll(".link")
                .data(hierarchy.links())
                .enter()
                .append("path")
                .attr("class", "link")
                .attr("d", d => {
                    const turnX = d.source.y + (nodeSizes[1] * 0.85); 
                    return `M ${d.source.y},${d.source.x} H ${turnX} V ${d.target.x} H ${d.target.y}`;
                });

            const node = svgGroup.selectAll(".node")
                .data(hierarchy.descendants())
                .enter()
                .append("g")
                .attr("class", "node")
                .attr("transform", d => `translate(${d.y},${d.x})`);

            node.append("text")
                .attr("class", "node-text")
                .attr("dy", "-0.25em")
                .attr("x", 4)
                .text(d => {
                    if (d.data.id === "00000000-0000-0000-0000-000000000000" || !d.data.line || d.data.line === "Невідомо") return "Невідомо";
                    let yearStr = d.data.year ? `.${d.data.year}` : "";
                    let breederStr = (d.data.breederAbbr || d.data.breader) ? ` (${d.data.breederAbbr || d.data.breader})` : "";
                    return `${d.data.line}${yearStr}${breederStr}`;
                });

            node.append("text")
                .attr("class", "insemination-text")
                .attr("dy", "1.1em")
                .attr("x", 4) 
                .text(d => ((d.data.mother || d.data.dronesMother) && d.data.inseminationText) ? d.data.inseminationText : "");

            return { minX, maxX, minY, maxY };
        }

        function generatePdfAll() {
            const printBtn = document.querySelector('.print-btn');
            const originalText = printBtn.innerText;
            
            const query = document.getElementById('searchInput').value.toLowerCase();
            const sortMode = document.getElementById('sortSelect').value;

            // Формируем список для печати с учетом поиска и сортировки
            let printDB = queensDatabase.filter(d => {
                const q = d.queen || {};
                return `${q.line} ${q.markNumber} ${q.breederAbbr}`.toLowerCase().includes(query);
            });

            if (sortMode === 'yearAsc') {
                printDB.sort((a, b) => new Date(a.queen.birthday) - new Date(b.queen.birthday));
            } else if (sortMode === 'yearDesc') {
                printDB.sort((a, b) => new Date(b.queen.birthday) - new Date(a.queen.birthday));
            }

            if (printDB.length === 0) {
                alert("Нет данных для печати. Измените параметры поиска.");
                return;
            }

            printBtn.innerText = `⏳ Подготовка ${printDB.length} стр...`;
            
            const printArea = document.getElementById('print-area');
            printArea.innerHTML = '';

            printDB.forEach((data) => {
                const q = data.queen;
                const pageDiv = document.createElement('div');
                pageDiv.className = 'print-page';
                
                const header = document.createElement('div');
                header.className = 'print-header';
                let year = new Date(q.birthday).getFullYear();
                let mark = q.markNumber ? ` | Метка: ${q.markNumber}` : '';
                header.innerText = `Линия: ${q.line || '—'} (${q.breederAbbr || '—'})${mark} | Год: ${year || '—'}`;
                pageDiv.appendChild(header);

                const svgElem = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                svgElem.style.width = '100%';
                svgElem.style.height = '92%';
                
                const gElem = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                svgElem.appendChild(gElem);
                pageDiv.appendChild(svgElem);
                printArea.appendChild(pageDiv);

                const bounds = drawTree(data.pedigreeTree, d3.select(gElem), [30, 145]);

                const paddingY = 50;
                const treeHeight = (bounds.maxX - bounds.minX) + paddingY * 2;
                const fixedWidth = 800; 
                const viewHeight = Math.max(1100, treeHeight);

                svgElem.setAttribute('viewBox', `0 0 ${fixedWidth} ${viewHeight}`);

                const offsetY = Math.abs(bounds.minX) + paddingY;
                gElem.setAttribute('transform', `translate(10, ${offsetY})`);
            });

            // Динамический таймаут в зависимости от количества маток
            const delay = Math.max(1000, printDB.length * 10);

            setTimeout(() => {
                window.print();
                printBtn.innerText = originalText;
                printArea.innerHTML = ''; 
            }, delay);
        }

        window.onload = filterQueens;
    </script>
</body>
</html>
